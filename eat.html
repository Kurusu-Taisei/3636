<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>食べたいものリスト</title>
  <style>
    /* 全体設定 */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 80px 15px 100px;
      background: #f4f6fa;
      color: #333;
    }

    h1 {
      font-size: 1.4rem;
      text-align: center;
      margin-bottom: 20px;
    }

    /* 戻るボタン */
    .back-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #ffffff;
      color: #333;
      padding: 8px 14px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    /* ＋追加ボタン */
    .add-btn {
      position: fixed;
      bottom: 30px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #4da3ff;
      color: #fff;
      font-size: 30px;
      border: none;
      box-shadow: 0 4px 12px rgba(77,163,255,0.5);
      cursor: pointer;
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* カードデザイン */
    #listBody {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .card {
      background: #fff;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      position: relative;
      box-sizing: border-box;
    }

    /* 食べた！チェックボックス */
    .done-check {
      position: absolute;
      top: 18px;
      left: 15px;
    }
    
    .done-check input[type="checkbox"] {
      width: 22px;
      height: 22px;
    }

    /* テキスト情報 */
    .food-title {
      font-weight: bold;
      font-size: 1.1rem;
      padding: 0 0 5px 40px;
      word-break: break-all;
      line-height: 1.4;
    }

    .store-info {
      font-size: 0.95rem;
      color: #333;
      padding: 0 0 5px 40px;
    }

    .place-info {
      font-size: 0.85rem;
      color: #777;
      padding: 0 0 10px 40px;
    }

    .url-area {
      padding-left: 40px;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }

    .url-link {
      font-size: 0.85rem;
      word-break: break-all;
      margin-bottom: 10px;
    }
    .url-link a {
      color: #007aff;
      text-decoration: none;
    }

    /* 操作ボタン */
    .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .edit-btn, .delete-btn {
      padding: 8px 15px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      min-width: 70px;
    }
    .edit-btn { background: #f0f0f0; color: #333; }
    .delete-btn { background: #ffebeb; color: #ff5b5b; }

    /* 完了済み（食べた！） */
    .card.done-row {
      background: #f8f8f8;
      opacity: 0.7;
    }
    .card.done-row .food-title {
      text-decoration: line-through;
      color: #888;
    }

    /* モーダル */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 2000;
      backdrop-filter: blur(4px);
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #fff;
      padding: 25px;
      border-radius: 20px;
      width: 85%;
      max-width: 400px;
    }
    .close-btn {
      float: right;
      border: none;
      background: #eee;
      width: 30px;
      height: 30px;
      border-radius: 50%;
    }
    .form-group { margin-bottom: 15px; }
    label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.9rem; }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      box-sizing: border-box;
      font-size: 16px;
    }
    .save-btn {
      width: 100%;
      padding: 12px;
      background: #4da3ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 1rem;
    }
  </style>
</head>
<body>

<a href="index.html" class="back-btn">🏠 戻る</a>

<h1>🍖 食べたいものリスト</h1>
<button class="add-btn" id="openModal">＋</button>

<div class="modal" id="modal">
  <div class="modal-content">
    <button class="close-btn" id="closeModal">✕</button>
    <h2 id="modalTitle" style="margin-top:0">追加</h2>
    <div class="form-group">
      <label>食べ物</label>
      <input id="foodInput" placeholder="例：特製醤油ラーメン">
    </div>
    <div class="form-group">
      <label>店名</label>
      <input id="storeInput" placeholder="例：麺屋まるいち">
    </div>
    <div class="form-group">
      <label>場所</label>
      <input id="placeInput" placeholder="例：新宿駅西口">
    </div>
    <div class="form-group">
      <label>URL</label>
      <input id="urlInput" type="url" placeholder="https://tabelog.com/...">
    </div>
    <button class="save-btn" id="saveBtn">保存する</button>
  </div>
</div>

<div id="listBody"></div>

<script>
  const modal = document.getElementById('modal');
  const foodInput = document.getElementById('foodInput');
  const storeInput = document.getElementById('storeInput');
  const placeInput = document.getElementById('placeInput');
  const urlInput = document.getElementById('urlInput');
  const listBody = document.getElementById('listBody');
  const modalTitle = document.getElementById('modalTitle');

  let editIndex = null;
  let data = JSON.parse(localStorage.getItem('eatList')) || [];

  function saveData() {
    localStorage.setItem('eatList', JSON.stringify(data));
  }

  function render() {
    listBody.innerHTML = '';
    
    const sortedData = data.map((item, index) => ({ ...item, originalIndex: index }));
    sortedData.sort((a, b) => a.done - b.done);

    sortedData.forEach(item => {
      const index = item.originalIndex;
      const card = document.createElement('div');
      card.className = 'card' + (item.done ? ' done-row' : '');

      card.innerHTML = `
        <div class="done-check">
          <input type="checkbox" ${item.done ? 'checked' : ''}>
        </div>
        <div class="food-title">${item.food}</div>
        <div class="store-info">${item.store ? '🏠 ' + item.store : ''}</div>
        <div class="place-info">${item.place ? '📍 ' + item.place : ''}</div>
        <div class="url-area">
          ${item.url ? `<div class="url-link"><a href="${item.url}" target="_blank">🔗 リンクを開く</a></div>` : ''}
          <div class="actions">
            <button class="edit-btn">編集</button>
            <button class="delete-btn">削除</button>
          </div>
        </div>
      `;

      card.querySelector('input[type="checkbox"]').onchange = (e) => {
        data[index].done = e.target.checked;
        saveData();
        render();
      };

      card.querySelector('.edit-btn').onclick = () => {
        editIndex = index;
        modalTitle.textContent = '編集';
        foodInput.value = item.food;
        storeInput.value = item.store || '';
        placeInput.value = item.place || '';
        urlInput.value = item.url || '';
        modal.classList.add('active');
      };

      card.querySelector('.delete-btn').onclick = () => {
        if (confirm('削除しますか？')) {
          data.splice(index, 1);
          saveData();
          render();
        }
      };

      listBody.appendChild(card);
    });
  }

  document.getElementById('openModal').onclick = () => {
    editIndex = null;
    modalTitle.textContent = '追加';
    foodInput.value = storeInput.value = placeInput.value = urlInput.value = '';
    modal.classList.add('active');
  };

  document.getElementById('closeModal').onclick = () => modal.classList.remove('active');
  modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('active'); };

  document.getElementById('saveBtn').onclick = () => {
    const foodValue = foodInput.value.trim();
    if (!foodValue) return alert('食べ物を入力してください');
    
    const item = {
      food: foodValue,
      store: storeInput.value.trim(),
      place: placeInput.value.trim(),
      url: urlInput.value.trim(),
      done: editIndex !== null ? data[editIndex].done : false
    };

    if (editIndex === null) data.push(item);
    else data[editIndex] = item;

    saveData();
    render();
    modal.classList.remove('active');
  };

  render();
</script>
</body>
</html>
