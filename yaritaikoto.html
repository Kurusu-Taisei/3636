<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>やりたいことリスト</title>

  <link rel="apple-touch-icon" href="topicon.jpg">
  <link rel="icon" href="topicon.jpg">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    /* 全体設定 - 以前のデザインを完全維持 */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 80px 15px 100px;
      background: #f4f6fa;
      color: #333;
    }
    h1 { font-size: 1.3rem; text-align: center; margin-bottom: 20px; line-height: 1.4; }
    .back-btn { position: fixed; top: 15px; left: 15px; background: #ffffff; color: #333; padding: 8px 14px; border-radius: 20px; text-decoration: none; font-size: 14px; font-weight: bold; box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 1000; }
    .add-btn { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: #4da3ff; color: #fff; font-size: 30px; border: none; box-shadow: 0 4px 12px rgba(77,163,255,0.5); cursor: pointer; z-index: 1000; display: flex; justify-content: center; align-items: center; }
    #listBody { display: flex; flex-direction: column; gap: 15px; }
    .card { background: #fff; padding: 15px; border-radius: 15px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); position: relative; box-sizing: border-box; }
    .done-check { position: absolute; top: 18px; left: 15px; }
    .done-check input[type="checkbox"] { width: 22px; height: 22px; }
    .task-title { font-weight: bold; font-size: 1.1rem; padding: 0 0 5px 40px; word-break: break-all; line-height: 1.4; }
    .place-info { font-size: 0.9rem; color: #555; padding: 0 0 10px 40px; }
    .url-area { padding-left: 40px; border-top: 1px solid #eee; padding-top: 10px; }
    .url-link { font-size: 0.85rem; word-break: break-all; margin-bottom: 10px; }
    .url-link a { color: #007aff; text-decoration: none; }
    .actions { display: flex; gap: 8px; justify-content: flex-end; }
    .edit-btn, .delete-btn { padding: 8px 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; min-width: 70px; }
    .edit-btn { background: #f0f0f0; color: #333; }
    .delete-btn { background: #ffebeb; color: #ff5b5b; }
    .card.done-row { background: #f8f8f8; opacity: 0.7; }
    .card.done-row .task-title { text-decoration: line-through; color: #888; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(4px); }
    .modal.active { display: flex; }
    .modal-content { background: #fff; padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; }
    .close-btn { float: right; border: none; background: #eee; width: 30px; height: 30px; border-radius: 50%; }
    .form-group { margin-bottom: 15px; }
    label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.9rem; }
    input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
    .save-btn { width: 100%; padding: 12px; background: #4da3ff; color: #fff; border: none; border-radius: 10px; font-weight: bold; font-size: 1rem; }
  </style>
</head>
<body>

<a href="index.html" class="back-btn">🏠 戻る</a>
<h1>🎾 やりたいこと / 🚗 行きたいとこ</h1>
<button class="add-btn" id="openModal">＋</button>

<div class="modal" id="modal">
  <div class="modal-content">
    <button class="close-btn" id="closeModal">✕</button>
    <h2 id="modalTitle" style="margin-top:0">追加</h2>
    <div class="form-group">
      <label>内容</label>
      <input id="taskInput" placeholder="例：海外旅行に行く">
    </div>
    <div class="form-group">
      <label>場所</label>
      <input id="placeInput" placeholder="例：オーストラリア">
    </div>
    <div class="form-group">
      <label>URL</label>
      <input id="urlInput" type="url" placeholder="https://example.com">
    </div>
    <button class="save-btn" id="saveBtn">保存する</button>
  </div>
</div>

<div id="listBody"></div>

<script>
  // --- Firebase 設定 ---
  const firebaseConfig = {
    apiKey: "AIzaSyBI-mu8jElSOrteIz-4mBKDaBSjnkqRItM",
    authDomain: "project-6007763521791397665.firebaseapp.com",
    projectId: "project-6007763521791397665",
    storageBucket: "project-6007763521791397665.firebasestorage.app",
    messagingSenderId: "606193419071",
    appId: "1:606193419071:web:4a5fd1c5ff82812cde498a",
    measurementId: "G-RWY30CWNJ1",
    databaseURL: "https://project-6007763521791397665-default-rtdb.firebaseio.com"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const yaritaiRef = db.ref('yaritaiList');

  const modal = document.getElementById('modal');
  const taskInput = document.getElementById('taskInput');
  const placeInput = document.getElementById('placeInput');
  const urlInput = document.getElementById('urlInput');
  const listBody = document.getElementById('listBody');
  const modalTitle = document.getElementById('modalTitle');

  let editId = null;
  let rawData = {};

  // リアルタイム読み込み
  yaritaiRef.on('value', (snapshot) => {
    rawData = snapshot.val() || {};
    render();
  });

  function render() {
    listBody.innerHTML = '';
    
    // オブジェクトを配列に変換
    const items = Object.keys(rawData).map(key => ({
      ...rawData[key],
      id: key
    }));

    // 未完了を上に、新しい順にソート
    items.sort((a, b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      return b.id - a.id;
    });

    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card' + (item.done ? ' done-row' : '');

      card.innerHTML = `
        <div class="done-check">
          <input type="checkbox" ${item.done ? 'checked' : ''}>
        </div>
        <div class="task-title">${item.task}</div>
        <div class="place-info">${item.place ? '📍 ' + item.place : ''}</div>
        <div class="url-area">
          ${item.url ? `<div class="url-link"><a href="${item.url}" target="_blank">🔗 リンクを開く</a></div>` : ''}
          <div class="actions">
            <button class="edit-btn">編集</button>
            <button class="delete-btn">削除</button>
          </div>
        </div>
      `;

      // チェックボックス変更
      card.querySelector('input[type="checkbox"]').onchange = (e) => {
        db.ref('yaritaiList/' + item.id).update({ done: e.target.checked });
      };

      // 編集ボタン
      card.querySelector('.edit-btn').onclick = () => {
        editId = item.id;
        modalTitle.textContent = '編集';
        taskInput.value = item.task;
        placeInput.value = item.place || '';
        urlInput.value = item.url || '';
        modal.classList.add('active');
      };

      // 削除ボタン
      card.querySelector('.delete-btn').onclick = () => {
        if (confirm('削除しますか？')) {
          db.ref('yaritaiList/' + item.id).remove();
        }
      };

      listBody.appendChild(card);
    });
  }

  // モーダル操作
  document.getElementById('openModal').onclick = () => {
    editId = null;
    modalTitle.textContent = '追加';
    taskInput.value = '';
    placeInput.value = '';
    urlInput.value = '';
    modal.classList.add('active');
  };
  document.getElementById('closeModal').onclick = () => modal.classList.remove('active');
  modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('active'); };

  // 保存処理
  document.getElementById('saveBtn').onclick = () => {
    const taskValue = taskInput.value.trim();
    if (!taskValue) return alert('内容を入力してください');

    const itemData = {
      task: taskValue,
      place: placeInput.value.trim(),
      url: urlInput.value.trim(),
      done: editId ? rawData[editId].done : false
    };

    if (editId) {
      db.ref('yaritaiList/' + editId).update(itemData);
    } else {
      const newId = Date.now().toString();
      db.ref('yaritaiList/' + newId).set({ ...itemData, id: newId });
    }

    modal.classList.remove('active');
  };
</script>
</body>
</html>
