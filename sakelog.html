<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>酒ログ</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
      background: #f4f6fa;
      color: #333;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* 戻るボタン */
    .back-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      background: #171b21;
      color: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      z-index: 1000;
    }

    .add-btn {
      display: block;
      margin: 0 auto 20px;
      padding: 10px 20px;
      background: #4da3ff;
      color: #fff;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    /* モーダル */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }
    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 420px;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      border: none;
      background: none;
      font-size: 18px;
      cursor: pointer;
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .stars {
      display: flex;
      gap: 4px;
      cursor: pointer;
    }

    .star {
      font-size: 20px;
      color: #ddd;
    }

    .star.active {
      color: #f5b301; /* 黄色 */
    }

    .save-btn {
      margin-top: 10px;
      padding: 8px 16px;
      background: #4da3ff;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      table-layout: fixed;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #e0e0e0;
      text-align: left;
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    th {
      background: #4da3ff;
      color: #fff;
    }

    th.date, td.date { width: 110px; }
    th.name, td.name { width: 140px; }
    th.type, td.type { width: 100px; }
    th.place, td.place { width: 120px; }
    th.rate, td.rate { width: 120px; }
    th.url, td.url { width: 260px; }

    /* URL + 操作ボタン固定 */
    .url-cell {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .url-text {
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .url-text a {
      color: #1e66ff;
      text-decoration: none;
    }

    .actions {
      display: inline-flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .edit-btn {
      padding: 4px 8px;
      background: #ffa94d;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    .delete-btn {
      padding: 4px 8px;
      background: #ff6b6b;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
  </style>
</head>
<body>

<a href="index.html" class="back-btn">🏠 メニュー一覧へ</a>

<h1>🍶 酒ログ</h1>
<button class="add-btn" id="openModal">＋追加する</button>

<!-- モーダル -->
<div class="modal" id="modal">
  <div class="modal-content">
    <button class="close-btn" id="closeModal">✕</button>
    <h2 id="modalTitle">追加</h2>

    <div class="form-group">
      <label>飲んだ日付</label>
      <input type="date" id="dateInput">
    </div>

    <div class="form-group">
      <label>お酒の名前</label>
      <input id="nameInput" placeholder="例：獺祭 純米大吟醸">
    </div>

    <div class="form-group">
      <label>種類</label>
      <input id="typeInput" placeholder="例：日本酒">
    </div>

    <div class="form-group">
      <label>飲んだ場所</label>
      <input id="placeInput" placeholder="例：自宅">
    </div>

    <div class="form-group">
      <label>おいしさ</label>
      <div class="stars" id="starInput"></div>
    </div>

    <div class="form-group">
      <label>URL</label>
      <input id="urlInput" placeholder="https://example.com">
    </div>

    <button class="save-btn" id="saveBtn">保存</button>
  </div>
</div>

<table>
  <thead>
    <tr>
      <th class="date">飲んだ日付</th>
      <th class="name">お酒の名前</th>
      <th class="type">種類</th>
      <th class="place">飲んだ場所</th>
      <th class="rate">おいしさ</th>
      <th class="url">URL</th>
    </tr>
  </thead>
  <tbody id="listBody"></tbody>
</table>

<script>
  const modal = document.getElementById('modal');
  const listBody = document.getElementById('listBody');
  const modalTitle = document.getElementById('modalTitle');

  const dateInput = document.getElementById('dateInput');
  const nameInput = document.getElementById('nameInput');
  const typeInput = document.getElementById('typeInput');
  const placeInput = document.getElementById('placeInput');
  const urlInput = document.getElementById('urlInput');
  const starInput = document.getElementById('starInput');

  let editIndex = null;
  let currentRate = 0;
  let data = JSON.parse(localStorage.getItem('sakeLog')) || [];

  function saveData() {
    localStorage.setItem('sakeLog', JSON.stringify(data));
  }

  function renderStars(container, rate, clickable = false) {
    container.innerHTML = '';
    for (let i = 1; i <= 5; i++) {
      const span = document.createElement('span');
      span.textContent = '★';
      span.className = 'star' + (i <= rate ? ' active' : '');
      if (clickable) {
        span.onclick = () => {
          currentRate = i;
          renderStars(container, currentRate, true);
        };
      }
      container.appendChild(span);
    }
  }

  function render() {
    listBody.innerHTML = '';

    data.forEach((item, index) => {
      const tr = document.createElement('tr');

      tr.innerHTML = `
        <td class="date">${item.date}</td>
        <td class="name">${item.name}</td>
        <td class="type">${item.type}</td>
        <td class="place">${item.place}</td>
        <td class="rate">
          <div class="stars">
            ${[1,2,3,4,5].map(n =>
              `<span class="star ${n <= item.rate ? 'active' : ''}">★</span>`
            ).join('')}
          </div>
        </td>
        <td class="url">
          <div class="url-cell">
            <div class="url-text">
              ${item.url ? `<a href="${item.url}" target="_blank">${item.url}</a>` : ''}
            </div>
            <div class="actions">
              <button class="edit-btn">編集</button>
              <button class="delete-btn">削除</button>
            </div>
          </div>
        </td>
      `;

      tr.querySelector('.edit-btn').onclick = () => {
        editIndex = index;
        modalTitle.textContent = '編集';
        dateInput.value = item.date;
        nameInput.value = item.name;
        typeInput.value = item.type;
        placeInput.value = item.place;
        urlInput.value = item.url;
        currentRate = item.rate;
        renderStars(starInput, currentRate, true);
        modal.classList.add('active');
      };

      tr.querySelector('.delete-btn').onclick = () => {
        if (confirm('削除しますか？')) {
          data.splice(index, 1);
          saveData();
          render();
        }
      };

      listBody.appendChild(tr);
    });
  }

  document.getElementById('openModal').onclick = () => {
    editIndex = null;
    modalTitle.textContent = '追加';
    dateInput.value = '';
    nameInput.value = '';
    typeInput.value = '';
    placeInput.value = '';
    urlInput.value = '';
    currentRate = 0;
    renderStars(starInput, currentRate, true);
    modal.classList.add('active');
  };

  document.getElementById('closeModal').onclick = () => modal.classList.remove('active');
  modal.onclick = e => { if (e.target === modal) modal.classList.remove('active'); };

  document.getElementById('saveBtn').onclick = () => {
    if (!nameInput.value.trim()) {
      alert('お酒の名前を入力してください');
      return;
    }

    const item = {
      date: dateInput.value,
      name: nameInput.value.trim(),
      type: typeInput.value.trim(),
      place: placeInput.value.trim(),
      rate: currentRate,
      url: urlInput.value.trim()
    };

    if (editIndex === null) {
      data.unshift(item);
    } else {
      data[editIndex] = item;
    }

    saveData();
    render();
    modal.classList.remove('active');
  };

  render();
</script>

</body>
</html>
