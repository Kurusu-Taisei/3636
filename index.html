<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3636</title>

  <link rel="apple-touch-icon" href="topicon.jpg">
  <link rel="icon" href="topicon.jpg">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="3636">

  <style>
    :root{
      --bg:#0f1216;
      --card:#171b21;
      --text:#e7ecf3;
      --muted:#9aa4b2;
      --accent:#4da3ff;
      --ring:#6aa7ff55;
    }
    @media (prefers-color-scheme: light){
      :root{
        --bg:#f7f8fb;
        --card:#ffffff;
        --text:#0b1420;
        --muted:#687385;
        --accent:#1e66ff;
        --ring:#1e66ff33;
      }
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      max-width:720px;
      margin:40px auto;
      padding:0 16px;
    }
    h1{
      font-size:28px;
      margin-bottom:16px;
      text-align: center; /* タイトルを中央に */
    }
    .desc{
      color:var(--muted);
      margin-bottom:20px;
      font-size:14px;
    }
    .menu-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
    }
    @media(max-width:480px){
      .menu-grid{grid-template-columns:1fr;}
    }
    .menu-item{
      display:flex;
      align-items:center;
      gap:12px;
      padding:16px 14px;
      border-radius:16px;
      background:var(--card);
      text-decoration:none;
      color:inherit;
      border:1px solid rgba(255,255,255,.06);
      transition: transform .08s ease, box-shadow .15s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .menu-item:hover{
      transform:translateY(-1px);
      box-shadow:0 6px 18px rgba(0,0,0,.22);
      border-color:rgba(100,150,255,.35);
    }
    .emoji{
      font-size:26px;
      line-height:1;
      width:34px;
      text-align:center;
      flex:0 0 34px;
    }
    .label{font-weight:600;}
    .chev{
      margin-left:auto;
      opacity:.35;
      font-size:18px;
      transition:transform .15s ease,opacity .15s ease;
    }
    .menu-item:hover .chev{
      transform:translateX(2px);
      opacity:.6;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>🐶機能一覧🐶</h1>

    <nav class="menu-grid" aria-label="機能メニュー">
      <a class="menu-item" href="calendar.html">
        <span class="emoji">📅</span>
        <span class="label">カレンダー</span>
        <span class="chev">›</span>
      </a>

      <a class="menu-item" href="todo.html">
        <span class="emoji">✅</span>
        <span class="label">ToDoリスト</span>
        <span class="chev">›</span>
      </a>

      <a class="menu-item" href="yaritaikoto.html">
        <span class="emoji">🎾</span>
        <span class="label">やりたいことリスト</span>
        <span class="chev">›</span>
      </a>

      <a class="menu-item" href="eat.html">
        <span class="emoji">🍖</span>
        <span class="label">食べたいものリスト</span>
        <span class="chev">›</span>
      </a>

      <a class="menu-item" href="sakelog.html">
        <span class="emoji">🍶</span>
        <span class="label">酒ログ</span>
        <span class="chev">›</span>
      </a>
    </nav>
  </main>
</body>
</html>
