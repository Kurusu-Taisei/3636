<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ToDoリスト</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
      background: #f4f6fa;
      color: #333;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* 戻るボタン */
    .back-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      background: #171b21;
      color: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      z-index: 1000;
    }

    .add-btn {
      display: block;
      margin: 0 auto 20px;
      padding: 10px 20px;
      background: #4da3ff;
      color: #fff;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    /* モーダル */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }
    .modal.active { display: flex; }

    .modal-content {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 420px;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      border: none;
      background: none;
      font-size: 18px;
      cursor: pointer;
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .save-btn {
      margin-top: 10px;
      padding: 8px 16px;
      background: #4da3ff;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      table-layout: fixed;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #e0e0e0;
      text-align: left;
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    th {
      background: #4da3ff;
      color: #fff;
    }

    th.done, td.done { width: 50px; text-align: center; }
    th.task, td.task { width: 180px; }
    th.deadline, td.deadline { width: 120px; }
    th.url, td.url { width: 260px; }

    .url-cell {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .url-text {
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .url-text a {
      color: #1e66ff;
      text-decoration: none;
    }

    .actions {
      display: inline-flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .edit-btn {
      padding: 4px 8px;
      background: #ffa94d;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    .delete-btn {
      padding: 4px 8px;
      background: #ff6b6b;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    tr.done-row {
      background: #f0f0f0;
      color: #999;
    }

    tr.done-row a {
      color: #999;
    }
  </style>
</head>
<body>

<a href="menu_list.html" class="back-btn">🏠 メニュー一覧へ</a>

<h1>📝 ToDoリスト</h1>
<button class="add-btn" id="openModal">＋追加する</button>

<!-- モーダル -->
<div class="modal" id="modal">
  <div class="modal-content">
    <button class="close-btn" id="closeModal">✕</button>
    <h2 id="modalTitle">追加</h2>

    <div class="form-group">
      <label>やること</label>
      <input id="taskInput" placeholder="例：ライブの予約">
    </div>

    <div class="form-group">
      <label>期限</label>
      <input id="deadlineInput" type="date">
    </div>

    <div class="form-group">
      <label>URL</label>
      <input id="urlInput" placeholder="https://example.com">
    </div>

    <button class="save-btn" id="saveBtn">保存</button>
  </div>
</div>

<table>
  <thead>
    <tr>
      <th class="done">済</th>
      <th class="task">やること</th>
      <th class="deadline">期限</th>
      <th class="url">URL</th>
    </tr>
  </thead>
  <tbody id="listBody"></tbody>
</table>

<script>
  const modal = document.getElementById('modal');
  const taskInput = document.getElementById('taskInput');
  const deadlineInput = document.getElementById('deadlineInput');
  const urlInput = document.getElementById('urlInput');
  const listBody = document.getElementById('listBody');
  const modalTitle = document.getElementById('modalTitle');

  let editIndex = null;
  let data = JSON.parse(localStorage.getItem('todoList')) || [];

  function saveData() {
    localStorage.setItem('todoList', JSON.stringify(data));
  }

  function render() {
    listBody.innerHTML = '';

    const sorted = [
      ...data.filter(d => !d.done),
      ...data.filter(d => d.done)
    ];

    sorted.forEach(item => {
      const index = data.indexOf(item);
      const tr = document.createElement('tr');
      if (item.done) tr.classList.add('done-row');

      tr.innerHTML = `
        <td class="done">
          <input type="checkbox" ${item.done ? 'checked' : ''}>
        </td>
        <td class="task">${item.task}</td>
        <td class="deadline">${item.deadline || ''}</td>
        <td class="url">
          <div class="url-cell">
            <div class="url-text">
              ${item.url ? `<a href="${item.url}" target="_blank">${item.url}</a>` : ''}
            </div>
            <div class="actions">
              <button class="edit-btn">編集</button>
              <button class="delete-btn">削除</button>
            </div>
          </div>
        </td>
      `;

      tr.querySelector('input[type="checkbox"]').onchange = e => {
        data[index].done = e.target.checked;
        saveData();
        render();
      };

      tr.querySelector('.edit-btn').onclick = () => {
        editIndex = index;
        modalTitle.textContent = '編集';
        taskInput.value = item.task;
        deadlineInput.value = item.deadline;
        urlInput.value = item.url;
        modal.classList.add('active');
      };

      tr.querySelector('.delete-btn').onclick = () => {
        if (confirm('削除しますか？')) {
          data.splice(index, 1);
          saveData();
          render();
        }
      };

      listBody.appendChild(tr);
    });
  }

  document.getElementById('openModal').onclick = () => {
    editIndex = null;
    modalTitle.textContent = '追加';
    taskInput.value = '';
    deadlineInput.value = '';
    urlInput.value = '';
    modal.classList.add('active');
  };

  document.getElementById('closeModal').onclick = () => modal.classList.remove('active');
  modal.onclick = e => { if (e.target === modal) modal.classList.remove('active'); };

  document.getElementById('saveBtn').onclick = () => {
    if (!taskInput.value.trim()) {
      alert('やることを入力してください');
      return;
    }

    const item = {
      task: taskInput.value.trim(),
      deadline: deadlineInput.value,
      url: urlInput.value.trim(),
      done: false
    };

    if (editIndex === null) {
      data.push(item);
    } else {
      item.done = data[editIndex].done;
      data[editIndex] = item;
    }

    saveData();
    render();
    modal.classList.remove('active');
  };

  render();
</script>

</body>
</html>
