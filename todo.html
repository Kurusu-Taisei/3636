<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ToDoリスト</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 80px 15px 100px;
      background: #f0f2f5;
      color: #333;
    }

    h1 {
      font-size: 1.4rem;
      text-align: center;
      margin-bottom: 20px;
    }

    .back-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #ffffff;
      color: #333;
      padding: 8px 14px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    .add-btn {
      position: fixed;
      bottom: 30px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #4da3ff;
      color: #fff;
      font-size: 30px;
      border: none;
      box-shadow: 0 4px 12px rgba(77,163,255,0.5);
      cursor: pointer;
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    table, tbody, tr, td {
      display: block;
      width: 100%;
    }

    tr {
      background: #fff;
      margin-bottom: 15px;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      position: relative;
      box-sizing: border-box; /* 枠線を含めた幅計算 */
    }

    td.done {
      position: absolute;
      top: 18px;
      left: 15px;
      width: 30px;
    }
    
    td.done input[type="checkbox"] {
      width: 22px;
      height: 22px;
    }

    td.task {
      font-weight: bold;
      font-size: 1.1rem;
      padding: 0 0 8px 40px;
      white-space: normal;
      word-break: break-all;
      line-height: 1.4;
    }

    td.deadline {
      font-size: 0.85rem;
      color: #777;
      padding: 0 0 8px 40px;
    }

    /* URLとボタンの親要素 */
    td.url {
      padding: 5px 0 0 40px;
      box-sizing: border-box;
    }

    .url-cell {
      display: flex;
      flex-direction: column; /* 縦に並べることで横幅を確保 */
      gap: 10px;
    }

    .url-text {
      font-size: 0.85rem;
      word-break: break-all; /* 長いURLを途中で改行させる */
      white-space: normal;
    }
    .url-text a {
      color: #007aff;
      text-decoration: none;
    }

    /* ボタンエリアの改善 */
    .actions {
      display: flex;
      gap: 8px;
      width: 100%;
      justify-content: flex-end; /* 右寄せ */
    }

    .edit-btn, .delete-btn {
      padding: 10px 15px; /* タップしやすいサイズ */
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      min-width: 70px; /* ボタンの最低幅を確保 */
    }
    .edit-btn { background: #f0f0f0; color: #333; }
    .delete-btn { background: #ffebeb; color: #ff5b5b; }

    tr.done-row {
      background: #f8f8f8;
      opacity: 0.7;
    }
    tr.done-row .task {
      text-decoration: line-through;
      color: #888;
    }

    /* モーダル関連は変更なし */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 2000;
      backdrop-filter: blur(4px);
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #fff;
      padding: 25px;
      border-radius: 20px;
      width: 85%;
      max-width: 400px;
    }
    .close-btn {
      float: right;
      border: none;
      background: #eee;
      width: 30px;
      height: 30px;
      border-radius: 50%;
    }
    .form-group { margin-bottom: 15px; }
    label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.9rem; }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      box-sizing: border-box;
      font-size: 16px;
    }
    .save-btn {
      width: 100%;
      padding: 12px;
      background: #4da3ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 1rem;
    }
  </style>
</head>
<body>

<a href="index.html" class="back-btn">🏠 戻る</a>

<h1>📝 ToDoリスト</h1>
<button class="add-btn" id="openModal">＋</button>

<div class="modal" id="modal">
  <div class="modal-content">
    <button class="close-btn" id="closeModal">✕</button>
    <h2 id="modalTitle" style="margin-top:0">追加</h2>
    <div class="form-group">
      <label>やること</label>
      <input id="taskInput" placeholder="例：ライブの予約">
    </div>
    <div class="form-group">
      <label>期限</label>
      <input id="deadlineInput" type="date">
    </div>
    <div class="form-group">
      <label>URL</label>
      <input id="urlInput" type="url" placeholder="https://example.com">
    </div>
    <button class="save-btn" id="saveBtn">保存する</button>
  </div>
</div>

<div id="listBody"></div> <script>
  const modal = document.getElementById('modal');
  const taskInput = document.getElementById('taskInput');
  const deadlineInput = document.getElementById('deadlineInput');
  const urlInput = document.getElementById('urlInput');
  const listBody = document.getElementById('listBody');
  const modalTitle = document.getElementById('modalTitle');

  let editIndex = null;
  let data = JSON.parse(localStorage.getItem('todoList')) || [];

  function saveData() {
    localStorage.setItem('todoList', JSON.stringify(data));
  }

  function render() {
    listBody.innerHTML = '';
    const sortedData = data.map((item, index) => ({ ...item, originalIndex: index }));
    sortedData.sort((a, b) => a.done - b.done);

    sortedData.forEach(item => {
      const index = item.originalIndex;
      const card = document.createElement('tr'); // CSSでblockにしているのでそのまま利用
      if (item.done) card.classList.add('done-row');

      card.innerHTML = `
        <td class="done">
          <input type="checkbox" ${item.done ? 'checked' : ''}>
        </td>
        <td class="task">${item.task}</td>
        <td class="deadline">${item.deadline ? '📅 ' + item.deadline : ''}</td>
        <td class="url">
          <div class="url-cell">
            ${item.url ? `<div class="url-text"><a href="${item.url}" target="_blank">🔗 リンクを開く</a></div>` : ''}
            <div class="actions">
              <button class="edit-btn">編集</button>
              <button class="delete-btn">削除</button>
            </div>
          </div>
        </td>
      `;

      card.querySelector('input[type="checkbox"]').onchange = (e) => {
        data[index].done = e.target.checked;
        saveData();
        render();
      };

      card.querySelector('.edit-btn').onclick = () => {
        editIndex = index;
        modalTitle.textContent = '編集';
        taskInput.value = item.task;
        deadlineInput.value = item.deadline || '';
        urlInput.value = item.url || '';
        modal.classList.add('active');
      };

      card.querySelector('.delete-btn').onclick = () => {
        if (confirm('削除しますか？')) {
          data.splice(index, 1);
          saveData();
          render();
        }
      };

      listBody.appendChild(card);
    });
  }

  document.getElementById('openModal').onclick = () => {
    editIndex = null;
    modalTitle.textContent = '追加';
    taskInput.value = '';
    deadlineInput.value = '';
    urlInput.value = '';
    modal.classList.add('active');
  };
  document.getElementById('closeModal').onclick = () => modal.classList.remove('active');
  modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('active'); };

  document.getElementById('saveBtn').onclick = () => {
    const taskValue = taskInput.value.trim();
    if (!taskValue) return alert('内容を入力してください');
    const item = {
      task: taskValue,
      deadline: deadlineInput.value,
      url: urlInput.value.trim(),
      done: editIndex !== null ? data[editIndex].done : false
    };
    if (editIndex === null) data.push(item);
    else data[editIndex] = item;
    saveData();
    render();
    modal.classList.remove('active');
  };

  render();
</script>
</body>
</html>
